<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Membership - Payment Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .pricing-info {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 40px;
            border: 2px solid #e9ecef;
        }

        .pricing-option {
            display: inline-block;
            margin: 0 15px;
        }

        .pricing-option .duration {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .pricing-option .price {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
        }

        .price-separator {
            color: #ccc;
            margin: 0 10px;
            display: inline-block;
        }

        .payment-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            margin-bottom: 20px;
        }

        .payment-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .payment-btn:active {
            transform: translateY(-1px);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 30px;
        }

        .payment-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-btn:hover {
            background: #667eea;
            color: white;
            transform: translateX(5px);
        }

        .option-btn .duration {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .option-btn .price {
            font-size: 22px;
            font-weight: 700;
        }

        .close-modal {
            float: right;
            font-size: 28px;
            font-weight: bold;
            color: #999;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-modal:hover {
            color: #333;
        }

        /* Success/Loading Styles */
        .success-container {
            display: none;
            text-align: center;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 40px;
        }

        .success-container h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .success-container p {
            color: #666;
            font-size: 16px;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .timer {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
            margin: 30px 0;
            font-family: 'Courier New', monospace;
        }

        .timer-label {
            color: #999;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .waiting-message {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            text-align: left;
            color: #856404;
        }

        .hidden {
            display: none;
        }

        .shown {
            display: block;
        }

        /* Access Granted */
        .access-granted {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            padding: 30px;
            border-radius: 15px;
            color: white;
            text-align: center;
        }

        .access-granted h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .access-granted p {
            font-size: 16px;
            opacity: 0.9;
        }

        .info-text {
            color: #999;
            font-size: 13px;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .pricing-option {
                display: block;
                margin: 15px 0;
            }

            .payment-btn {
                padding: 15px 40px;
                font-size: 16px;
            }
        }

        .plan-select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #667eea;
            border-radius: 8px;
            background-color: white;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .plan-select:hover {
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .plan-select:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Main Content -->
        <div id="mainContent">
            <div class="header">
                <h1>🎯 Premium Membership</h1>
                <p>Get your access today</p>
            </div>

            <div class="pricing-info">
                <label for="planSelect" style="display: block; margin-bottom: 15px; font-size: 16px; color: #333; font-weight: 600;">
                    Select Your Plan:
                </label>
                <select id="planSelect" class="plan-select" onchange="handlePlanSelect()">
                    <option value="">-- Choose a Plan --</option>
                    <option value="week">📅 1 Week - ₹50</option>
                    <option value="month">📅 1 Month - ₹100</option>
                </select>
            </div>

            <button class="payment-btn" id="paymentBtn" onclick="openPaymentModal()" style="display: none;">
                💳 Proceed to Payment
            </button>

            <p class="info-text">✅ Secure and Fast Payment</p>
        </div>

        <!-- Payment Modal -->
        <div id="paymentModal" class="modal">
            <div class="modal-content">
                <span class="close-modal" onclick="closePaymentModal()">&times;</span>
                <div class="modal-header">Complete Payment</div>
                <div id="paymentInfo" style="margin-bottom: 30px; padding: 20px; background: #f8f9fa; border-radius: 10px;">
                    <p style="color: #666; margin-bottom: 10px;">Plan: <strong id="planName"></strong></p>
                    <p style="color: #667eea; font-size: 24px; font-weight: 700;">₹<span id="planPrice"></span></p>
                </div>
                <p style="color: #666; margin-bottom: 20px; font-size: 14px; line-height: 1.6;">
                    Click the button below to proceed to Razorpay for secure payment. After successful payment, please come back to this page for further instructions.
                </p>
                <a href="https://razorpay.me/@cyberwithranjan" target="_blank" class="payment-btn" style="display: inline-block; text-decoration: none;">
                    💳 Pay Now on Razorpay
                </a>
                <p style="color: #999; margin-top: 15px; font-size: 13px;">🔒 Secured by Razorpay</p>
            </div>
        </div>
    </div>

    <script>
        const paymentModal = document.getElementById('paymentModal');
        const mainContent = document.getElementById('mainContent');
        const planSelect = document.getElementById('planSelect');
        const paymentBtn = document.getElementById('paymentBtn');
        let selectedPlan = null;
        let countdownTimer = null;

        // Plan details
        const plans = {
            week: {
                name: '1 Week Access',
                price: 50,
                duration: 'week'
            },
            month: {
                name: '1 Month Access',
                price: 100,
                duration: 'month'
            }
        };

        function handlePlanSelect() {
            const selected = planSelect.value;
            
            if (selected) {
                selectedPlan = plans[selected];
                paymentBtn.style.display = 'inline-block';
            } else {
                selectedPlan = null;
                paymentBtn.style.display = 'none';
            }
        }

        function openPaymentModal() {
            if (selectedPlan) {
                document.getElementById('planName').textContent = selectedPlan.name;
                document.getElementById('planPrice').textContent = selectedPlan.price;
                paymentModal.style.display = 'block';
            }
        }

        function closePaymentModal() {
            paymentModal.style.display = 'none';
        }

        function processPayment(duration, amount) {
            closePaymentModal();
            
            // Hide main content
            mainContent.innerHTML = `
                <div class="success-container" style="display: block;">
                    <div class="success-icon">✓</div>
                    <h2>Payment Successful!</h2>
                    <p>Thank you for your purchase of <strong>₹${amount}</strong></p>
                    
                    <div class="timer-label">Please wait for your access:</div>
                    <div class="timer" id="countdown">05:00:00</div>
                    
                    <div class="waiting-message">
                        ⏱️ Your ${duration === 'week' ? '1 Week' : '1 Month'} access will be activated soon.
                        <br><br>
                        Please wait for 5 hours. Your access will be granted shortly after the timer finishes.
                    </div>
                </div>
            `;

            // Start countdown timer
            startCountdown(duration, amount);
        }

        function startCountdown(duration, amount) {
            let totalSeconds = 18000; // 5 hours in seconds (5 * 60 * 60)
            
            countdownTimer = setInterval(() => {
                totalSeconds--;
                
                const hours = Math.floor(totalSeconds / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;
                
                const timeString = 
                    String(hours).padStart(2, '0') + ':' +
                    String(minutes).padStart(2, '0') + ':' +
                    String(seconds).padStart(2, '0');
                
                const countdownElement = document.getElementById('countdown');
                if (countdownElement) {
                    countdownElement.textContent = timeString;
                }
                
                // Time completed
                if (totalSeconds <= 0) {
                    clearInterval(countdownTimer);
                    showAccessGranted(duration, amount);
                }
            }, 1000);
        }

        function showAccessGranted(duration, amount) {
            mainContent.innerHTML = `
                <div class="success-container" style="display: block;">
                    <div class="success-icon">🎉</div>
                    
                    <div class="access-granted">
                        <h2>✅ Access Granted!</h2>
                        <p>Your account is now active</p>
                        <p style="margin-top: 15px; font-size: 14px;">
                            ${duration === 'week' ? '📅 1 Week' : '📅 1 Month'} full access
                        </p>
                    </div>
                    
                    <div style="margin-top: 30px; color: #666;">
                        <p><strong>₹${amount}</strong> payment completed</p>
                        <p style="margin-top: 15px; font-size: 14px;">Your premium membership has been activated</p>
                    </div>
                </div>
            `;
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target === paymentModal) {
                closePaymentModal();
            }
        }
    </script>
</body>
</html>
